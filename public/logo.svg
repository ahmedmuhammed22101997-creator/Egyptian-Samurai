<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Egyptian SAMURAI logo - Tutankhamun mask">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="186"/>
    </clipPath>
    <clipPath id="nemes-clip">
      <path d="M 75 200 Q 75 70 200 70 Q 325 70 325 200 L 360 400 L 40 400 Z"/>
    </clipPath>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7"/>
      <stop offset="100%" stop-color="#F5EDD8"/>
    </linearGradient>
    <linearGradient id="face-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="100%" stop-color="#C8A878"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="190" fill="url(#bg-grad)"/>

  <!-- Nemes (striped headdress) -->
  <g clip-path="url(#nemes-clip)">
    <g clip-path="url(#circle-clip)">
      <rect x="40" y="60" width="320" height="360" fill="#D4AF37"/>
      <rect x="68" y="60" width="22" height="360" fill="#1E5F8E"/>
      <rect x="112" y="60" width="22" height="360" fill="#1E5F8E"/>
      <rect x="156" y="60" width="22" height="360" fill="#1E5F8E"/>
      <rect x="200" y="60" width="22" height="360" fill="#1E5F8E"/>
      <rect x="244" y="60" width="22" height="360" fill="#1E5F8E"/>
      <rect x="288" y="60" width="22" height="360" fill="#1E5F8E"/>
    </g>
  </g>

  <!-- Nemes outline -->
  <path d="M 75 200 Q 75 70 200 70 Q 325 70 325 200" fill="none" stroke="#A8801A" stroke-width="3" clip-path="url(#circle-clip)"/>

  <!-- Face -->
  <ellipse cx="200" cy="225" rx="72" ry="92" fill="url(#face-grad)" stroke="#A8801A" stroke-width="2"/>

  <!-- Eyebrows -->
  <path d="M 152 200 Q 168 190 188 198" stroke="#1A1A1A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 212 198 Q 232 190 248 200" stroke="#1A1A1A" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Eyes (almond shape) -->
  <path d="M 156 215 Q 170 207 184 215 Q 170 222 156 215 Z" fill="#1A1A1A"/>
  <path d="M 216 215 Q 230 207 244 215 Q 230 222 216 215 Z" fill="#1A1A1A"/>

  <!-- Kohl extensions -->
  <path d="M 184 215 L 196 213" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <path d="M 216 215 L 204 213" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <path d="M 156 215 L 145 218" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <path d="M 244 215 L 255 218" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

  <!-- Pupils -->
  <circle cx="170" cy="215" r="3.5" fill="#FDFBF7"/>
  <circle cx="230" cy="215" r="3.5" fill="#FDFBF7"/>

  <!-- Nose -->
  <path d="M 200 220 Q 195 250 198 265 Q 200 270 202 265 Q 205 250 200 220" fill="none" stroke="#A8801A" stroke-width="2" stroke-linecap="round"/>

  <!-- Mouth -->
  <path d="M 184 285 Q 200 290 216 285" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 188 285 Q 200 282 212 285" stroke="#A8801A" stroke-width="2" fill="none"/>

  <!-- Uraeus (cobra) on forehead -->
  <g>
    <path d="M 200 165 Q 188 145 195 130 Q 205 125 210 135 Q 212 150 200 165 Z" fill="#D4AF37" stroke="#1A1A1A" stroke-width="2"/>
    <ellipse cx="200" cy="135" rx="6" ry="8" fill="#1E5F8E" stroke="#1A1A1A" stroke-width="1.5"/>
    <circle cx="198" cy="133" r="1.5" fill="#FDFBF7"/>
  </g>

  <!-- Pharaoh beard -->
  <path d="M 188 312 L 192 380 Q 200 388 208 380 L 212 312 Q 200 320 188 312 Z" fill="#1E5F8E" stroke="#D4AF37" stroke-width="2.5" clip-path="url(#circle-clip)"/>
  <line x1="194" y1="325" x2="194" y2="375" stroke="#D4AF37" stroke-width="1.5" clip-path="url(#circle-clip)"/>
  <line x1="200" y1="325" x2="200" y2="378" stroke="#D4AF37" stroke-width="1.5" clip-path="url(#circle-clip)"/>
  <line x1="206" y1="325" x2="206" y2="375" stroke="#D4AF37" stroke-width="1.5" clip-path="url(#circle-clip)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#D4AF37" stroke-width="8"/>
  <circle cx="200" cy="200" r="183" fill="none" stroke="#A8801A" stroke-width="1.5"/>
</svg>
